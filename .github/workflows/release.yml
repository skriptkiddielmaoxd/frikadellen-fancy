name: Release on tag (automatic)

# Builds release artifacts for Linux, Windows and macOS when a tag like
# `v*` is pushed, then creates a GitHub Release and uploads the artifacts.

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Build release
        run: cargo build --release

      - name: Prepare artifact
        run: |
          mkdir -p out || true
          if [ -f target/release/frikadellen_baf ]; then cp target/release/frikadellen_baf out/frikadellen_baf-${{ matrix.os }} || true; fi
          if [ -f target/release/frikadellen_baf.exe ]; then cp target/release/frikadellen_baf.exe out/frikadellen_baf-${{ matrix.os }}.exe || true; fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frikadellen-${{ matrix.os }}
          path: out/**

  publish:
    name: Create Release and upload artifacts
    needs: build
    runs-on: ubuntu-latest
    if: github.repository == 'skriptkiddielmaoxd/frikadellen-fancy'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: out

      - name: Create GitHub Release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}
            Artifacts built for linux/windows/macos.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: out/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}