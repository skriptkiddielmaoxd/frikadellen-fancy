name: Manual Release (dispatch only)

# This workflow is intentionally manual to avoid automatic releases
# being created by upstream workflow copies. Use `Run workflow` and
# provide the `tag_name` when creating a release.

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to create or use for the release (e.g. v3.0.1)'
        required: true
      release_name:
        description: 'Release title (optional)'
        required: false
      body:
        description: 'Release notes/body (optional)'
        required: false
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: 'false'

jobs:
  release:
    name: Build and create release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Build
        run: cargo build --release || true

      - name: Prepare artifact
        run: |
          mkdir -p out || true
          if [ -f target/release/frikadellen_baf ] ; then cp target/release/frikadellen_baf out/ || true ; fi

      - name: Create or update GitHub Release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          release_name: ${{ github.event.inputs.release_name || github.event.inputs.tag_name }}
          body: ${{ github.event.inputs.body || "Generated by manual workflow" }}
          draft: false
          prerelease: ${{ fromJson(github.event.inputs.prerelease) || false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        if: always()
        uses: softprops/action-gh-release@v1
        with:
          files: out/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}