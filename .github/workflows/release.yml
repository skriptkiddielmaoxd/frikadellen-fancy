on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-and-publish:
    name: Build Linux binary & publish release asset
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -C codegen-units=16
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (nightly)
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: nightly
          components: clippy

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Install sccache and enable RUSTC_WRAPPER
        id: install_sccache
        run: |
          set -e
          cargo install sccache
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          sccache --version
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
        shell: bash

      - name: Show environment
        run: |
          rustc --version
          cargo --version

      - name: Build Rust backend (release)
        run: cargo build -p frikadellen-baf-121 --release

      # Create a release only when the workflow was triggered by a tag push.
      - name: Create release (when not a release event)
        id: create_release
        if: github.event_name != 'release'
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: "Automated release for ${{ github.ref_name }}"
          draft: false
          prerelease: false

      # Ensure we have a numeric release id in env for the upload step:
      - name: Set RELEASE_ID for existing release
        if: github.event_name == 'release'
        run: echo "RELEASE_ID=${{ github.event.release.id }}" >> $GITHUB_ENV

      - name: Set RELEASE_ID for created release
        if: github.event_name != 'release'
        run: echo "RELEASE_ID=${{ steps.create_release.outputs.id }}" >> $GITHUB_ENV

      # Upload Linux binary to release
      - name: Upload Linux binary to release
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const binPath = path.join(process.cwd(), 'target', 'release', 'frikadellen-baf-121');
            if (!fs.existsSync(binPath)) {
              core.setFailed(`Linux binary not found: ${binPath}`);
              return;
            }
            const releaseId = parseInt(process.env.RELEASE_ID || '');
            if (!releaseId) {
              core.setFailed('RELEASE_ID not set.');
              return;
            }
            const stat = fs.statSync(binPath);
            const name = `frikadellen-baf-121-${process.env.GITHUB_REF_NAME || process.env.GITHUB_REF || 'artifact'}-linux`;
            const data = fs.readFileSync(binPath);
            await github.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: name,
              data,
              headers: {
                'content-type': 'application/octet-stream',
                'content-length': stat.size
              }
            });
            core.info(`Uploaded Linux binary as ${name}`);
  build-package-and-publish:
    name: Build package & publish release assets
    runs-on: windows-latest
    env:
      RUSTC_WRAPPER: sccache
      RUSTFLAGS: -C codegen-units=16
    steps:
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Install sccache
        run: |
          cargo install sccache
        shell: bash

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (nightly)
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: nightly
          components: clippy

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup (choco)
        run: choco install innosetup -y

      - name: Show environment
        run: |
          dotnet --info
          rustc --version
          cargo --version

      - name: Build Rust backend (release)
        run: cargo build -p frikadellen-baf-121 --release

      - name: Publish Avalonia UI (Windows single-file exe)
        run: |
          dotnet restore src/Frikadellen.UI/Frikadellen.UI.csproj
          dotnet publish src/Frikadellen.UI/Frikadellen.UI.csproj -c Release -r win-x64 -p:SelfContained=true -p:PublishSingleFile=true -o publish/Frikadellen.UI

      - name: Run installer build script
        shell: pwsh
        run: |
          if (Test-Path .\installer\build-installer.ps1) {
            .\installer\build-installer.ps1
          } else {
            Write-Error "installer\\build-installer.ps1 not found; packaging cannot continue."
            exit 1
          }

      # Create a release only when the workflow was triggered by a tag push.
      - name: Create release (when not a release event)
        id: create_release
        if: github.event_name != 'release'
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: "Automated release for ${{ github.ref_name }}"
          draft: false
          prerelease: false

      # Ensure we have a numeric release id in env for the upload step:
      - name: Set RELEASE_ID for existing release
        if: github.event_name == 'release'
        run: echo "RELEASE_ID=${{ github.event.release.id }}" >> $GITHUB_ENV

      - name: Set RELEASE_ID for created release
        if: github.event_name != 'release'
        run: echo "RELEASE_ID=${{ steps.create_release.outputs.id }}" >> $GITHUB_ENV

      # Upload assets to the release using the Octokit API via github-script
      - name: Upload installer to release
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // Look for installer in installer/output (match what build script produces)
            const candidateDir = path.join(process.cwd(), 'installer', 'output');
            if (!fs.existsSync(candidateDir)) {
              core.setFailed(`Installer output directory not found: ${candidateDir}`);
              return;
            }

            // pick first .exe or all assets
            const files = fs.readdirSync(candidateDir).filter(f => /\.(exe|zip|msi)$/i.test(f));
            if (files.length === 0) {
              core.setFailed(`No installer assets found in ${candidateDir}.`);
              return;
            }

            const releaseId = parseInt(process.env.RELEASE_ID || '');
            if (!releaseId) {
              core.setFailed('RELEASE_ID not set.');
              return;
            }

            for (const file of files) {
              const fullPath = path.join(candidateDir, file);
              const stat = fs.statSync(fullPath);
              const name = `${file.replace(/\.exe$/i, '')}-${process.env.GITHUB_REF_NAME || process.env.GITHUB_REF || 'artifact'}${path.extname(file)}`;

              const data = fs.readFileSync(fullPath);
              await github.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: name,
                data,
                headers: {
                  'content-type': 'application/octet-stream',
                  'content-length': stat.size
                }
              });
              core.info(`Uploaded ${file} as ${name}`);
            }