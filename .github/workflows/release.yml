name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v3.0.1)'
        required: true

permissions:
  contents: write

jobs:
  # Single source of truth for the tag name, regardless of which event fired.
  get-tag:
    name: Resolve tag name
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Resolve tag
        id: tag
        env:
          TAG_DISPATCH: ${{ inputs.tag_name }}
          TAG_RELEASE: ${{ github.event.release.tag_name }}
          TAG_REF: ${{ github.ref_name }}
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "value=${TAG_DISPATCH}" >> $GITHUB_OUTPUT
          elif [ "$GITHUB_EVENT_NAME" = "release" ]; then
            echo "value=${TAG_RELEASE}" >> $GITHUB_OUTPUT
          else
            echo "value=${TAG_REF}" >> $GITHUB_OUTPUT
          fi

  # Create the GitHub release entry; skipped when triggered by an existing release event.
  create-release:
    name: Create GitHub Release
    needs: get-tag
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-tag.outputs.tag }}
          name: ${{ needs.get-tag.outputs.tag }}
          body: "Automated release for ${{ needs.get-tag.outputs.tag }}"
          draft: false
          prerelease: false

  build-linux:
    name: Build Linux binary & publish asset
    needs: [get-tag, create-release]
    # Run when get-tag succeeded AND create-release either succeeded or was skipped (release event).
    if: >-
      always() && !cancelled() &&
      needs.get-tag.result == 'success' &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Install sccache
        shell: bash
        run: |
          curl -fL -o sccache.tar.gz https://github.com/mozilla/sccache/releases/download/v0.7.4/sccache-v0.7.4-x86_64-unknown-linux-musl.tar.gz
          tar -xzf sccache.tar.gz
          echo "$PWD/sccache-v0.7.4-x86_64-unknown-linux-musl" >> $GITHUB_PATH
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Build Rust backend (release)
        run: cargo build -p frikadellen-fancy --release

      - name: Rename binary with version tag
        shell: bash
        run: cp target/release/frikadellen-fancy "target/release/frikadellen-fancy-${{ needs.get-tag.outputs.tag }}-linux"

      - name: Upload Linux binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-tag.outputs.tag }}
          files: target/release/frikadellen-fancy-${{ needs.get-tag.outputs.tag }}-linux

  build-windows:
    name: Build Windows package & publish assets
    needs: [get-tag, create-release]
    # Run when get-tag succeeded AND create-release either succeeded or was skipped (release event).
    if: >-
      always() && !cancelled() &&
      needs.get-tag.result == 'success' &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/Mozilla/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Install sccache
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/mozilla/sccache/releases/download/v0.7.4/sccache-v0.7.4-x86_64-pc-windows-msvc.tar.gz" -OutFile "sccache-win.tar.gz" -ErrorAction Stop
          tar -xzf sccache-win.tar.gz
          $sccacheDir = "$PWD\sccache-v0.7.4-x86_64-pc-windows-msvc"
          echo "$sccacheDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "RUSTC_WRAPPER=sccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Rust backend (release)
        run: cargo build -p frikadellen-fancy --release

      - name: Publish Avalonia UI (Windows single-file exe)
        run: dotnet publish Frikadellen.UI/Frikadellen.UI.csproj -c Release -r win-x64 -p:SelfContained=true -p:PublishSingleFile=true -o Frikadellen.UI/publish

      - name: Run installer build script
        shell: pwsh
        run: .\installer\build-installer.ps1

      - name: Upload installer assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-tag.outputs.tag }}
          files: |
            installer/output/*.exe
            installer/output/*.zip
            installer/output/*.msi