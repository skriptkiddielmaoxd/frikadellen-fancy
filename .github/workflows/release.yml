name: Release

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Create the GitHub release once, before the build jobs start.
  # Skipped when the workflow was triggered by an existing release event.
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - name: Create Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: "Automated release for ${{ github.ref_name }}"
          draft: false
          prerelease: false

  build-linux-and-publish:
    name: Build Linux binary & publish release asset
    runs-on: ubuntu-latest
    needs: [create-release]
    # Run for both trigger paths: after create-release (tag push / workflow_dispatch)
    # or directly for an existing release event (create-release is skipped in that case).
    if: always() && !cancelled() && !failure()
    env:
      RUSTFLAGS: -C codegen-units=16
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-sccache-

      # Download a pre-built sccache binary instead of compiling from source (~10 min).
      - name: Install sccache
        run: |
          curl -fL -o sccache.tar.gz https://github.com/mozilla/sccache/releases/download/v0.7.4/sccache-v0.7.4-x86_64-unknown-linux-musl.tar.gz
          tar -xzf sccache.tar.gz
          echo "$PWD/sccache-v0.7.4-x86_64-unknown-linux-musl" >> $GITHUB_PATH
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
        shell: bash

      - name: Show environment
        run: |
          rustc --version
          cargo --version
          sccache --version

      - name: Build Rust backend (release)
        run: cargo build -p frikadellen-fancy --release

      - name: Rename Linux binary with version tag
        run: cp target/release/frikadellen-fancy target/release/frikadellen-fancy-${{ github.ref_name }}-linux
        shell: bash

      - name: Upload Linux binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: target/release/frikadellen-fancy-${{ github.ref_name }}-linux

  build-package-and-publish:
    name: Build package & publish release assets
    runs-on: windows-latest
    needs: [create-release]
    if: always() && !cancelled() && !failure()
    env:
      RUSTFLAGS: -C codegen-units=16
    steps:
      # Checkout first so Cargo.lock is present for the sccache cache key.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      # Windows sccache stores its cache under %LOCALAPPDATA%\Mozilla\sccache.
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/Mozilla/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Install sccache
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/mozilla/sccache/releases/download/v0.7.4/sccache-v0.7.4-x86_64-pc-windows-msvc.tar.gz" -OutFile "sccache-win.tar.gz" -ErrorAction Stop
          tar -xzf sccache-win.tar.gz
          $sccacheDir = "$PWD\sccache-v0.7.4-x86_64-pc-windows-msvc"
          echo "$sccacheDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$sccacheDir\sccache.exe" --version
          echo "RUSTC_WRAPPER=sccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup (choco)
        run: choco install innosetup -y

      - name: Show environment
        run: |
          dotnet --info
          rustc --version
          cargo --version
          sccache --version

      - name: Build Rust backend (release)
        run: cargo build -p frikadellen-fancy --release

      - name: Publish Avalonia UI (Windows single-file exe)
        run: |
          dotnet restore Frikadellen.UI/Frikadellen.UI.csproj
          dotnet publish Frikadellen.UI/Frikadellen.UI.csproj -c Release -r win-x64 -p:SelfContained=true -p:PublishSingleFile=true -o Frikadellen.UI/publish

      - name: Run installer build script
        shell: pwsh
        run: |
          if (Test-Path .\installer\build-installer.ps1) {
            .\installer\build-installer.ps1
          } else {
            Write-Error "installer\\build-installer.ps1 not found; packaging cannot continue."
            exit 1
          }

      - name: Upload installer assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: installer/output/*.{exe,zip,msi}