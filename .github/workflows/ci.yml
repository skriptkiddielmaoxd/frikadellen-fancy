name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  build:
    name: Build & Test (matrix)
    env:
      RUSTFLAGS: -C codegen-units=16
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust (nightly)
        uses: actions-rs/toolchain@v1
        with:
          profile: default
          toolchain: nightly
          override: true

      - name: Install rustfmt & clippy
        run: |
          rustup component add rustfmt --toolchain nightly
          rustup component add clippy --toolchain nightly

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-sccache-

      # For Linux/macOS runners
      - name: Install sccache and enable RUSTC_WRAPPER (Linux/macOS)
        if: runner.os != 'Windows'
        id: install_sccache_unix
        shell: bash
        run: |
          set -e
          echo "Downloading sccache binary..."
          curl -L -o sccache.tar.gz https://github.com/mozilla/sccache/releases/download/v0.7.4/sccache-v0.7.4-x86_64-unknown-linux-musl.tar.gz
          tar -xzf sccache.tar.gz
          echo "$PWD/sccache-v0.7.4-x86_64-unknown-linux-musl" >> $GITHUB_PATH
          ./sccache-v0.7.4-x86_64-unknown-linux-musl/sccache --version
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

            # For Windows runners
      - name: Install sccache and enable RUSTC_WRAPPER (Windows)
        if: runner.os == 'Windows'
        id: install_sccache_windows
        shell: pwsh
        run: |
          Write-Host "Downloading sccache release..."
          Invoke-WebRequest -Uri "https://github.com/mozilla/sccache/releases/download/v0.7.4/sccache-v0.7.4-x86_64-pc-windows-msvc.tar.gz" -OutFile "sccache-win.tar.gz"
          tar -xzf sccache-win.tar.gz
          $sccacheDir = "$PWD\sccache-v0.7.4-x86_64-pc-windows-msvc"
          echo "$sccacheDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$sccacheDir\sccache.exe" --version
          echo "RUSTC_WRAPPER=sccache.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check formatting (cargo fmt)
        run: cargo fmt --all -- --check

      - name: Run clippy (no deny flags)
        env:
          RUSTC_WRAPPER: ""
        run: cargo clippy --all-targets --all-features

      - name: Build Rust backend (release)
        run: cargo build -p frikadellen-fancy --release

      - name: Run Rust tests
        run: cargo test -p frikadellen-fancy --all-features -- --nocapture

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore .NET packages
        run: dotnet restore

      - name: Build .NET solution
        run: dotnet build -c Release --no-restore

      - name: (Optional) Run .NET tests if present
        run: |
          set -e
          # Run tests only if there are any test projects; otherwise skip.
          TEST_PROJS=$(find . -name '*Test*.csproj' -o -name '*Tests*.csproj' || true)
          if [ -n "$TEST_PROJS" ]; then
            dotnet test --no-build -c Release
          else
            echo "No .NET test projects found; skipping dotnet test."
          fi
        shell: bash

      - name: Auto-tag commit and push tag
        if: github.event_name == 'push'
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: github-actions@users.noreply.github.com
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          TAG_NAME="autotag-$(date +'%Y%m%d-%H%M%S')-$(git rev-parse --short HEAD)"
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git tag "$TAG_NAME"
          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git
          git push origin "$TAG_NAME"
        shell: bash

  lint-yaml:
    name: Lint GitHub Actions YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow YAML files
        uses: endbug/add-and-commit@v9
        with:
          author_name: gha-linter
          author_email: gha-linter@example.com
          message: "ci: noop validation commit"
        # This step is a lightweight way to ensure workflow syntax is parseable by the runner.
        # For full linting you can integrate a third-party YAML linter action if desired.