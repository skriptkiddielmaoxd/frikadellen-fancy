# Continuous Integration for frikadellen-fancy
# - Builds Rust backend and .NET UI
# - Runs formatting checks, clippy and Rust tests
# - Runs dotnet restore & build
# Triggers on push and pull_request.
name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (matrix)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Cargo registry, git and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Rust (nightly)
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: nightly
          override: true

      - name: Install rustfmt & clippy
        run: |
          rustup component add rustfmt --toolchain nightly || true
          rustup component add clippy --toolchain nightly || true

      - name: Check formatting (cargo fmt)
        run: cargo fmt --all -- --check

      - name: Run clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build Rust backend (release)
        run: cargo build --workspace --release

      - name: Run Rust tests
        run: cargo test --workspace --all-features -- --nocapture

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore .NET packages
        run: dotnet restore

      - name: Build .NET solution
        run: dotnet build -c Release --no-restore

      - name: (Optional) Run .NET tests if present
        run: |
          set -e
          # Run tests only if there are any test projects; otherwise skip.
          TEST_PROJS=$(find . -name '*Test*.csproj' -o -name '*Tests*.csproj' || true)
          if [ -n "$TEST_PROJS" ]; then
            dotnet test --no-build -c Release
          else
            echo "No .NET test projects found; skipping dotnet test."
          fi
        shell: bash

  lint-yaml:
    name: Lint GitHub Actions YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow YAML files
        uses: endbug/add-and-commit@v9
        with:
          author_name: gha-linter
          author_email: gha-linter@example.com
          message: "ci: noop validation commit"
        # This step is a lightweight way to ensure workflow syntax is parseable by the runner.
        # For full linting you can integrate a third-party YAML linter action if desired.