name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  # Rust: format check + clippy cross-reference only.
  # cargo clippy --all-targets covers compilation correctness for all targets
  # (lib, bins, examples, tests, benches) without producing any binaries.
  # Full release builds happen exclusively in the release workflow.
  check-rust:
    name: Check Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache sccache (Linux)
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Cache sccache (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/Mozilla/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Install sccache (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fL -o sccache.tar.gz https://github.com/mozilla/sccache/releases/download/v0.7.4/sccache-v0.7.4-x86_64-unknown-linux-musl.tar.gz
          tar -xzf sccache.tar.gz
          echo "$PWD/sccache-v0.7.4-x86_64-unknown-linux-musl" >> $GITHUB_PATH
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Install sccache (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/mozilla/sccache/releases/download/v0.7.4/sccache-v0.7.4-x86_64-pc-windows-msvc.tar.gz" -OutFile "sccache-win.tar.gz" -ErrorAction Stop
          tar -xzf sccache-win.tar.gz
          $sccacheDir = "$PWD\sccache-v0.7.4-x86_64-pc-windows-msvc"
          echo "$sccacheDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "RUSTC_WRAPPER=sccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (cross-reference all targets)
        run: cargo clippy --all-targets --all-features

  # .NET: restore + build only (no publish, no test run).
  # Avalonia compiles on Linux, so one platform is sufficient for a compile check.
  check-dotnet:
    name: Check .NET
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore .NET packages
        run: dotnet restore Frikadellen.UI/Frikadellen.UI.sln

      - name: Build .NET solution
        run: dotnet build Frikadellen.UI/Frikadellen.UI.sln -c Release --no-restore

  lint-yaml:
    name: Lint GitHub Actions YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow YAML files
        uses: rhysd/actionlint@v1.7.7